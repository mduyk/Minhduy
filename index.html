<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop Proxy mduyk~</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

/* CONTAINER */
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

/* BOX */
.box {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 15px;
    text-align: center;
}

button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

/* TUYẾT */
.snowflake {
    position: fixed;
    top: -10px;
    animation: fall linear infinite;
    pointer-events: none;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1 style="text-align:center;">Shop Proxy mduyk~</h1>

    <div class="box">
        <h3>Proxy Ngày</h3>
        <p>10.000đ</p>
        <button onclick="buy('Proxy Ngày')">Mua ngay</button>
    </div>

    <div class="box">
        <h3>Proxy Tuần</h3>
        <p>40.000đ</p>
        <button onclick="buy('Proxy Tuần')">Mua ngay</button>
    </div>

    <div class="box">
        <h3>Proxy Tháng</h3>
        <p>60.000đ</p>
        <button onclick="buy('Proxy Tháng')">Mua ngay</button>
    </div>

    <div class="box">
        <h3>Proxy Vĩnh viễn</h3>
        <p>300.000đ</p>
        <button onclick="buy('Proxy Vĩnh viễn')">Mua ngay</button>
    </div>
</div>

<script>
function buy(goi) {
    window.location.href = "pay.html?goi=" + encodeURIComponent(goi);
}

/* TUYẾT */
setInterval(() => {
    const s = document.createElement("div");
    s.className = "snowflake";
    s.innerHTML = "❄";

    s.style.left = Math.random() * window.innerWidth + "px";
    s.style.fontSize = (10 + Math.random() * 10) + "px";
    s.style.animationDuration = (5 + Math.random() * 5) + "s";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 10000);
}, 150);
</script>

</body>
</html>
